services:
  - type: web
    name: flams-analytics-pro
    env: node
    plan: starter
    buildCommand: npm install --include=dev && npm run install:all && npm run build
    startCommand: node server/app.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: flams-analytics-db
          property: connectionString

databases:
  - name: flams-analytics-db
    plan: starter
